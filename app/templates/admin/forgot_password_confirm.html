{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="glass-card login-card text-center">
        <h2 class="cinematic-title">Clave Generada</h2>
        <p class="form-help-text">Se ha generado una nueva clave temporal para tu cuenta.</p>
        
        <div class="confirmation-actions">
            <a href="{{ whatsapp_url }}" target="_blank" class="btn-wa">
                <i class="fab fa-whatsapp"></i> Enviar por WhatsApp
            </a>
            <p class="sub-text">Haz clic en el botón superior para enviar la clave al usuario.</p>
        </div>

        <div class="auth-links">
            <a href="{{ url_for('admin.login') }}" class="link-slate">Volver al Login</a>
        </div>
    </div>
</div>

<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 2rem;
    }
    
    .login-card {
        width: 100%;
        max-width: 450px;
        padding: 3rem;
        background: var(--ui-surface);
        border: 1px solid var(--ui-border);
        border-radius: 15px;
        text-align: center;
    }

    .cinematic-title {
        color: var(--accent-gold);
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 1rem;
    }

    .form-help-text {
        color: var(--text-white);
        margin-bottom: 2rem;
    }

    .btn-wa {
        display: inline-block;
        padding: 1.2rem 2rem;
        background: #25D366; /* WhatsApp Green */
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: transform 0.3s;
        box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
    }

    .btn-wa:hover {
        transform: translateY(-3px);
        filter: brightness(1.1);
    }

    .sub-text {
        color: var(--accent-slate);
        font-size: 0.8rem;
        margin-top: 1rem;
    }

    .auth-links {
        margin-top: 2rem;
    }

    .link-slate {
        color: var(--accent-gold);
        text-decoration: none;
        font-weight: 600;
    }
</style>
{% endblock %}
